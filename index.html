<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Football Fields Benghazi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #0F0F0F;
            --color-white: #FAFAFA;
            --color-green: #00FF55; /* Electric sports green */
            --color-green-dark: #00CC44;
            --color-gray: #222222;

            --bg-color: var(--color-black);
            --text-color: var(--color-white);
            --accent-color: var(--color-green);

            --font-heading: 'Teko', sans-serif;
            --font-body: 'Manrope', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            text-transform: uppercase;
            line-height: 0.9;
        }

        /* Shift background colors based on section class */
        section {
            padding: 8rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .theme-dark {
            --bg-color: var(--color-black);
            --text-color: var(--color-white);
            --accent-color: var(--color-green);
        }

        .theme-light {
            --bg-color: var(--color-white);
            --text-color: var(--color-black);
            --accent-color: var(--color-green-dark);
        }

        .theme-green {
            --bg-color: var(--color-green);
            --text-color: var(--color-black);
            --accent-color: var(--color-white);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Staggered entrance animations setup */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Stagger delays */
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }
        .delay-4 { transition-delay: 0.4s; }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* --- Header & Navigation --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
            color: var(--color-white);
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--color-green);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background-color: var(--color-green);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-block;
            padding: 1.2rem 2.5rem;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
            margin-top: 2rem;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--color-black);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* --- Hero Section --- */
        #home {
            position: relative;
            justify-content: center;
            align-items: flex-start;
        }

        .hero-content {
            z-index: 10;
        }

        .hero-heading {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            max-width: 1200px;
            letter-spacing: -2px;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .hero-heading span {
            display: block;
            color: var(--accent-color);
        }

        .hero-subheading {
            font-size: 1.5rem;
            max-width: 600px;
            margin-top: 1.5rem;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Marquee */
        .marquee-wrapper {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 0;
            opacity: 0.05;
            pointer-events: none;
        }

        .marquee-text {
            display: inline-block;
            font-family: var(--font-heading);
            font-size: clamp(10rem, 25vw, 20rem);
            font-weight: 800;
            text-transform: uppercase;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* --- About Section --- */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-title {
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 2rem;
        }

        .about-text p {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 3rem;
        }

        .stat-item {
            border-top: 4px solid var(--accent-color);
            padding-top: 1rem;
        }

        .stat-number {
            font-family: var(--font-heading);
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        /* --- Reservation Section --- */
        .reserve-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: clamp(4rem, 10vw, 8rem);
            text-align: center;
            margin-bottom: 2rem;
            line-height: 0.85;
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-control {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--color-black);
            padding: 1rem 0;
            font-family: var(--font-body);
            font-size: 1.25rem;
            color: var(--color-black);
            outline: none;
            transition: border-color 0.3s ease;
            appearance: none;
        }

        .theme-dark .form-control {
            border-bottom-color: var(--color-white);
            color: var(--color-white);
        }

        .form-control:focus {
            border-bottom-color: var(--accent-color);
        }

        .form-control::placeholder {
            color: transparent;
        }

        .form-label {
            position: absolute;
            top: 1rem;
            left: 0;
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-gray);
            pointer-events: none;
            transition: 0.3s ease all;
        }

        .theme-dark .form-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus ~ .form-label,
        .form-control:not(:placeholder-shown) ~ .form-label {
            top: -1.5rem;
            font-size: 0.85rem;
            color: var(--accent-color);
        }

        select.form-control {
            cursor: pointer;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Success Message */
        .form-success {
            display: none;
            background-color: var(--color-black);
            color: var(--color-green);
            padding: 2rem;
            text-align: center;
            font-family: var(--font-heading);
            font-size: 2rem;
            border-left: 5px solid var(--color-green);
            margin-top: 2rem;
        }

        .form-success.active {
            display: block;
        }

        /* --- Testimonials Section --- */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 4rem;
            margin-top: 4rem;
        }

        .testimonial-item {
            border-left: 2px solid var(--accent-color);
            padding-left: 2rem;
        }

        .testimonial-quote {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .testimonial-author {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* --- Contact Section --- */
        .contact-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .contact-info {
            font-size: 2rem;
            margin: 2rem 0;
            font-weight: 500;
        }

        .contact-info a {
            position: relative;
            display: inline-block;
        }

        .contact-info a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 100%;
            height: 3px;
            background-color: var(--accent-color);
            transition: height 0.3s ease;
            z-index: -1;
        }

        .contact-info a:hover::after {
            height: 100%;
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            font-size: 1rem;
            opacity: 0.6;
            margin-top: 4rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .about-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 1rem;
            }
            .hero-heading {
                font-size: clamp(4rem, 15vw, 6rem);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GOAL<span>.</span></div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="theme-dark">
        <div class="container hero-content">
            <h1 class="hero-heading reveal delay-1">DOMINATE<br><span>THE PITCH</span></h1>
            <p class="hero-subheading reveal delay-2">Elite football fields in Benghazi for players, teams, and schools ready to take their game to the next level.</p>
            <a href="#" class="btn btn-primary reveal delay-3">Book Now</a>
        </div>

        <div class="marquee-wrapper">
            <div class="marquee-text">
                PLAY HARD • SCORE GOALS • BENGHAZI FOOTBALL • PLAY HARD • SCORE GOALS • BENGHAZI FOOTBALL •
            </div>
        </div>
    </section>

    <script>
        // Scroll Entrance Animations (Intersection Observer)
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => {
            observer.observe(el);
        });

        // Background Color Shift Observer
        const sectionObserverOptions = {
            root: null,
            rootMargin: '-50% 0px -50% 0px',
            threshold: 0
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const theme = Array.from(entry.target.classList).find(c => c.startsWith('theme-'));
                    if (theme) {
                        // Apply theme variables to body
                        const computedStyle = getComputedStyle(entry.target);
                        document.body.style.setProperty('--bg-color', computedStyle.getPropertyValue('--bg-color'));
                        document.body.style.setProperty('--text-color', computedStyle.getPropertyValue('--text-color'));
                    }
                }
            });
        }, sectionObserverOptions);

        document.querySelectorAll('section').forEach(section => {
            sectionObserver.observe(section);
        });

    </script>
</body>
</html>
